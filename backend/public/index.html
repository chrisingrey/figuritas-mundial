<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figuritas Mundial API</title>
    <style>
      :root {
        color: #101214;
        background: #f8f7f1;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        background:
          radial-gradient(circle at 0 0, rgba(255, 109, 0, 0.18), transparent 30%),
          radial-gradient(circle at 100% 18%, rgba(71, 92, 206, 0.18), transparent 28%),
          #f8f7f1;
      }

      main {
        width: min(100%, 560px);
        padding: 24px;
        background: #ffffff;
        border: 3px solid #101214;
        border-radius: 8px;
        box-shadow: 8px 8px 0 rgba(16, 18, 20, 0.18);
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 6px 0 6px;
        font-size: 38px;
        line-height: 0.92;
        text-transform: uppercase;
      }

      .subtitle {
        margin: 0 0 22px;
        color: #5a5d63;
        font-weight: 800;
      }

      .status {
        display: inline-grid;
        place-items: center;
        min-height: 36px;
        padding: 0 14px;
        background: #f7d719;
        border: 2px solid #101214;
        border-radius: 999px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .status.ok {
        background: #b9e461;
      }

      .status.degraded,
      .status.down {
        background: #ff6d00;
      }

      .grid {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .service {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 12px;
        border: 2px solid #101214;
        border-radius: 8px;
      }

      .service strong {
        text-transform: uppercase;
      }

      .service small {
        grid-column: 1 / -1;
        color: #5a5d63;
        font-weight: 700;
      }

      .code {
        margin-top: 18px;
        padding: 12px;
        overflow: auto;
        color: #ffffff;
        background: #101214;
        border-radius: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Official Sticker Collection</p>
      <h1>Figuritas Mundial API</h1>
      <p class="subtitle">Backend deployment health check.</p>
      <span id="overall" class="status">Checking...</span>
      <section id="services" class="grid" aria-live="polite"></section>
      <pre id="raw" class="code">{}</pre>
    </main>

    <script>
      const overall = document.getElementById("overall");
      const services = document.getElementById("services");
      const raw = document.getElementById("raw");

      function renderService(name, service) {
        const status = service?.status || "down";
        return `
          <article class="service">
            <strong>${name}</strong>
            <span class="status ${status}">${status}</span>
            ${service?.message ? `<small>${service.message}</small>` : ""}
          </article>
        `;
      }

      fetch("/api/health")
        .then(async (response) => {
          const contentType = response.headers.get("content-type") || "";
          const body = contentType.includes("application/json")
            ? await response.json()
            : { status: "down", error: await response.text() };

          if (!response.ok) {
            throw body;
          }

          return body;
        })
        .then((health) => {
          overall.textContent = health.status;
          overall.className = `status ${health.status}`;
          services.innerHTML = Object.entries(health.services)
            .map(([name, service]) => renderService(name, service))
            .join("");
          raw.textContent = JSON.stringify(health, null, 2);
        })
        .catch((error) => {
          overall.textContent = "down";
          overall.className = "status down";
          services.innerHTML = renderService("api", {
            status: "down",
            message: "Could not fetch /api/health.",
          });
          raw.textContent = typeof error === "string"
            ? error
            : JSON.stringify(error, null, 2);
        });
    </script>
  </body>
</html>
